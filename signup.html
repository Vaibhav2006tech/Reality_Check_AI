<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
</head>
<body>
    <h2>Sign Up</h2>
    <input type="email" id="signupEmail" placeholder="Email" required><br><br>
    <input type="password" id="signupPassword" placeholder="Password" required><br><br>
    <button onclick="signUp()">Sign Up</button><br><br>
    <a href="/login">Already have an account? Login</a>

    <!-- Firebase SDKs -->
    <script type="module">
        // Import Firebase functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDyr3jYdbo3WzKlpcWM1BzPoVupWCcxwuY",
            authDomain: "realitycheck-8f81e.firebaseapp.com",
            projectId: "realitycheck-8f81e",
            storageBucket: "realitycheck-8f81e.firebasestorage.app",
            messagingSenderId: "327799012369",
            appId: "1:327799012369:web:357f952334b3db077605b0",
            measurementId: "G-Q0MRZXDKXJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Sign Up function
        window.signUp = function() {
            const email = document.getElementById("signupEmail").value;
            const password = document.getElementById("signupPassword").value;

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Registered Successfully!");
                    window.location.href = "/dashboard";
                })
                .catch((error) => {
                    alert(error.message);
                });
        };
    </script>
</body>
</html>
