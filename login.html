<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTH · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Exo+2:wght@200;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04060d;
    --panel: rgba(6, 16, 32, 0.85);
    --border: rgba(0, 200, 255, 0.12);
    --border-hot: rgba(0, 200, 255, 0.5);
    --accent: #00c8ff;
    --accent2: #ff3cac;
    --accent3: #ffe600;
    --text: #d0eeff;
    --muted: rgba(180, 220, 255, 0.35);
    --danger: #ff3860;
    --glow-cyan: rgba(0, 200, 255, 0.25);
    --glow-pink: rgba(255, 60, 172, 0.2);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Exo 2', sans-serif;
    position: relative;
  }

  /* ── Scanlines overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.12) 3px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── Animated perspective grid ── */
  .grid-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    perspective: 400px;
    overflow: hidden;
  }

  .grid-plane {
    position: absolute;
    bottom: -10%;
    left: 50%;
    transform: translateX(-50%) rotateX(65deg);
    width: 200%;
    height: 200%;
    background-image:
      linear-gradient(rgba(0,200,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.07) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 8s linear infinite;
  }

  @keyframes gridMove {
    from { background-position: 0 0; }
    to   { background-position: 0 60px; }
  }

  /* ── Glow orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 {
    width: 500px; height: 500px;
    top: -150px; left: -100px;
    background: radial-gradient(circle, rgba(0,200,255,0.12) 0%, transparent 70%);
    animation: orbDrift 12s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 400px; height: 400px;
    bottom: -100px; right: -80px;
    background: radial-gradient(circle, rgba(255,60,172,0.1) 0%, transparent 70%);
    animation: orbDrift 9s ease-in-out infinite alternate-reverse;
  }

  @keyframes orbDrift {
    from { transform: translate(0, 0); }
    to   { transform: translate(30px, 20px); }
  }

  /* ── Corner decorations ── */
  .corner {
    position: fixed;
    width: 80px; height: 80px;
    z-index: 2;
    pointer-events: none;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--accent);
    opacity: 0.4;
  }
  .corner::before { width: 2px; height: 100%; }
  .corner::after  { width: 100%; height: 2px; }
  .corner-tl { top: 24px; left: 24px; }
  .corner-tr { top: 24px; right: 24px; transform: scaleX(-1); }
  .corner-bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
  .corner-br { bottom: 24px; right: 24px; transform: scale(-1); }

  /* ── Main card ── */
  .login-card {
    position: relative;
    z-index: 10;
    width: 440px;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(24px) saturate(1.5);
    padding: 52px 44px 44px;
    animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) both;
    /* Clipped corners */
    clip-path: polygon(
      0 0, calc(100% - 24px) 0,
      100% 24px,
      100% 100%, 24px 100%,
      0 calc(100% - 24px)
    );
  }

  /* Card glow border via pseudo */
  .login-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, transparent 40%, transparent 60%, var(--accent2) 100%);
    clip-path: inherit;
    z-index: -1;
    opacity: 0.35;
  }

  /* Inner top gradient sheen */
  .login-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(180deg, rgba(0,200,255,0.05) 0%, transparent 100%);
    pointer-events: none;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.96); filter: blur(4px); }
    to   { opacity: 1; transform: translateY(0) scale(1);    filter: blur(0); }
  }

  /* ── Header ── */
  .logo-area {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
  }

  .logo-hex {
    position: relative;
    width: 64px; height: 64px;
    margin: 0 auto 16px;
  }

  .logo-hex svg {
    width: 100%; height: 100%;
    animation: hexPulse 3s ease-in-out infinite;
  }

  @keyframes hexPulse {
    0%,100% { filter: drop-shadow(0 0 6px var(--accent)) drop-shadow(0 0 18px rgba(0,200,255,0.3)); }
    50%      { filter: drop-shadow(0 0 14px var(--accent)) drop-shadow(0 0 40px rgba(0,200,255,0.5)); }
  }

  /* Rotating ring around hex */
  .logo-ring {
    position: absolute;
    inset: -10px;
    border: 1px dashed rgba(0,200,255,0.25);
    border-radius: 50%;
    animation: ringRotate 12s linear infinite;
  }

  .logo-ring::after {
    content: '';
    position: absolute;
    top: -3px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
  }

  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .logo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 10px;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,200,255,0.6), 0 0 60px rgba(0,200,255,0.2);
    line-height: 1;
  }

  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── Divider ── */
  .h-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    opacity: 0.5;
  }
  .h-divider span { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .h-divider em { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--accent); font-style: normal; }

  /* ── Fields ── */
  .field-group {
    margin-bottom: 18px;
    position: relative;
  }

  .field-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .field-label .label-dot {
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--accent);
  }

  .field-wrap {
    position: relative;
  }

  .field-bracket {
    position: absolute;
    top: 50%; left: 12px;
    transform: translateY(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: rgba(0,200,255,0.3);
    pointer-events: none;
    transition: color 0.3s;
  }

  .field-group:focus-within .field-bracket { color: var(--accent); }

  .field-input {
    width: 100%;
    background: rgba(0, 20, 40, 0.6);
    border: 1px solid var(--border);
    border-bottom-color: rgba(0,200,255,0.25);
    color: var(--text);
    padding: 13px 16px 13px 32px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .field-input::placeholder { color: rgba(180,220,255,0.15); }

  .field-input:focus {
    border-color: var(--border-hot);
    background: rgba(0, 30, 55, 0.7);
    box-shadow:
      0 0 0 1px rgba(0,200,255,0.2),
      0 4px 24px rgba(0,200,255,0.08),
      inset 0 1px 0 rgba(0,200,255,0.1);
  }

  /* Animated underline */
  .scan-line {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    width: 0;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2));
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px var(--accent);
  }
  .field-group:focus-within .scan-line { width: 100%; }

  /* ── Buttons ── */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 32px;
  }

  .btn {
    padding: 15px 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  }

  /* Shimmer effect */
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: skewX(-20deg);
    transition: left 0.5s;
  }
  .btn:hover::before { left: 150%; }

  .btn-signup {
    background: transparent;
    border: 1px solid rgba(0,200,255,0.35);
    color: var(--accent);
  }
  .btn-signup:hover {
    background: rgba(0,200,255,0.08);
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0,200,255,0.2), inset 0 0 20px rgba(0,200,255,0.05);
    transform: translateY(-2px);
  }
  .btn-signup:active { transform: translateY(0); }

  .btn-login {
    background: linear-gradient(135deg, var(--accent) 0%, #0080cc 100%);
    color: #020408;
    font-weight: 700;
  }
  .btn-login:hover {
    box-shadow: 0 0 30px rgba(0,200,255,0.5), 0 8px 24px rgba(0,0,0,0.4);
    transform: translateY(-2px);
    filter: brightness(1.1);
  }
  .btn-login:active { transform: translateY(0); }

  /* ── Status bar ── */
  .status-line {
    margin-top: 24px;
    padding: 10px 14px;
    background: rgba(0,200,255,0.03);
    border: 1px solid rgba(0,200,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .status-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: blink 2s step-end infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  .status-right {
    font-size: 9px;
    color: rgba(0,200,255,0.2);
    letter-spacing: 0;
  }

  /* ── Floating particles ── */
  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.7; }
    100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
  }

  /* ── Glitch flicker on logo ── */
  @keyframes glitch {
    0%,95%,100% { clip-path: none; transform: none; }
    96% { clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); transform: translateX(-4px); }
    97% { clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%); transform: translateX(4px); }
    98% { clip-path: none; transform: translateX(-2px); }
  }

  .logo-title { animation: glitch 6s steps(1) infinite; }
</style>
</head>
<body>

<!-- Background layers -->
<div class="grid-bg"><div class="grid-plane"></div></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Card -->
<div class="login-card">

  <div class="logo-area">
    <div class="logo-hex">
      <div class="logo-ring"></div>
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="32,3 61,18 61,46 32,61 3,46 3,18" stroke="#00c8ff" stroke-width="1.5" fill="none"/>
        <polygon points="32,13 51,23 51,41 32,51 13,41 13,23" stroke="#00c8ff" stroke-width="0.8" fill="rgba(0,200,255,0.04)"/>
        <polygon points="32,21 42,27 42,37 32,43 22,37 22,27" stroke="#00c8ff" stroke-width="0.5" fill="rgba(0,200,255,0.08)"/>
        <circle cx="32" cy="32" r="5" fill="#00c8ff"/>
        <circle cx="32" cy="32" r="8" stroke="#00c8ff" stroke-width="0.5" stroke-dasharray="2 3"/>
        <!-- spokes -->
        <line x1="32" y1="3"  x2="32" y2="13" stroke="#00c8ff" stroke-width="1.5"/>
        <line x1="32" y1="51" x2="32" y2="61" stroke="#00c8ff" stroke-width="1.5"/>
        <line x1="3"  y1="18" x2="13" y2="23" stroke="#00c8ff" stroke-width="1.5"/>
        <line x1="51" y1="41" x2="61" y2="46" stroke="#00c8ff" stroke-width="1.5"/>
        <line x1="61" y1="18" x2="51" y2="23" stroke="#00c8ff" stroke-width="1.5"/>
        <line x1="13" y1="41" x2="3"  y2="46" stroke="#00c8ff" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="logo-title">SYNTH</div>
    <div class="logo-sub">AI Detection System · v2.4.1</div>
  </div>

  <div class="h-divider">
    <span></span>
    <em>AUTHENTICATE</em>
    <span></span>
  </div>

  <div class="field-group">
    <label class="field-label">
      <span class="label-dot"></span>
      Access ID · Email
    </label>
    <div class="field-wrap">
      <span class="field-bracket">&gt;</span>
      <input type="email" id="email" class="field-input" placeholder="user@domain.com" autocomplete="email">
      <div class="scan-line"></div>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">
      <span class="label-dot"></span>
      Auth Key · Password
    </label>
    <div class="field-wrap">
      <span class="field-bracket">&gt;</span>
      <input type="password" id="password" class="field-input" placeholder="••••••••••••" autocomplete="current-password">
      <div class="scan-line"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-signup" onclick="signup()">Register</button>
    <button class="btn btn-login" onclick="login()">Authenticate</button>
  </div>

  <div class="status-line">
    <div class="status-left">
      <span class="status-dot"></span>
      <span>SECURE CONNECTION ESTABLISHED</span>
    </div>
    <span class="status-right">TLS 1.3 · AES-256</span>
  </div>

</div>

<script type="module" src="auth.js"></script>

<script>
  const container = document.getElementById('particles');
  const colors = ['#00c8ff', '#ff3cac', '#ffe600'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (10 + Math.random() * 18) + 's';
    p.style.animationDelay  = (Math.random() * 18) + 's';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width  = (Math.random() > 0.7 ? '3px' : '2px');
    p.style.height = p.style.width;
    container.appendChild(p);
  }
</script>

</body>
</html>
