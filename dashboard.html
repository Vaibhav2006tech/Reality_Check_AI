<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTH · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04060d;
    --surface: rgba(0,200,255,0.03);
    --surface2: rgba(0,200,255,0.06);
    --border: rgba(0,200,255,0.1);
    --border-bright: rgba(0,200,255,0.35);
    --accent: #00c8ff;
    --accent2: #ff3cac;
    --accent3: #ffe600;
    --accent4: #3dffb0;
    --text: #d0eeff;
    --muted: rgba(180,220,255,0.4);
    --muted2: rgba(180,220,255,0.15);
    --danger: #ff3860;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
    pointer-events: none; z-index: 999;
  }

  /* Perspective grid */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    perspective: 500px; overflow: hidden;
  }
  .grid-plane {
    position: absolute; bottom: -20%;
    left: 50%; transform: translateX(-50%) rotateX(60deg);
    width: 220%; height: 200%;
    background-image:
      linear-gradient(rgba(0,200,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.06) 1px, transparent 1px);
    background-size: 64px 64px;
    animation: gridMove 10s linear infinite;
  }
  @keyframes gridMove {
    from { background-position: 0 0; }
    to   { background-position: 0 64px; }
  }

  /* Glow orbs */
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(100px); pointer-events: none; z-index: 0;
  }
  .orb-1 {
    width: 600px; height: 400px; top: -100px; left: -150px;
    background: radial-gradient(circle, rgba(0,200,255,0.1) 0%, transparent 70%);
    animation: orbFloat 14s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 400px; height: 400px; bottom: -80px; right: -100px;
    background: radial-gradient(circle, rgba(255,60,172,0.08) 0%, transparent 70%);
    animation: orbFloat 10s ease-in-out infinite alternate-reverse;
  }
  @keyframes orbFloat {
    from { transform: translate(0,0); }
    to   { transform: translate(20px, 30px); }
  }

  /* Corner brackets */
  .corner { position: fixed; width: 60px; height: 60px; z-index: 2; pointer-events: none; }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent); opacity: 0.3; }
  .corner::before { width: 2px; height: 100%; }
  .corner::after  { width: 100%; height: 2px; }
  .corner-tl { top: 20px; left: 20px; }
  .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(4,6,13,0.88);
    backdrop-filter: blur(24px) saturate(1.4);
    border-bottom: 1px solid var(--border);
    padding: 0 36px; height: 66px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 18px; }

  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 8px;
    color: var(--accent);
    text-shadow: 0 0 24px rgba(0,200,255,0.6), 0 0 48px rgba(0,200,255,0.2);
  }

  .header-divider { width: 1px; height: 24px; background: var(--border-bright); opacity: 0.5; }

  .header-page {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 14px; }

  .user-badge {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 7px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; letter-spacing: 1px; color: var(--muted);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .user-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent4);
    box-shadow: 0 0 8px var(--accent4);
    animation: blink 2s step-end infinite;
    flex-shrink: 0;
  }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  .btn-nav {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 3px;
    padding: 9px 22px;
    border: 1px solid rgba(0,200,255,0.35);
    background: transparent; color: var(--accent);
    cursor: pointer; text-transform: uppercase;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.3s; position: relative; overflow: hidden;
  }
  .btn-nav::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,200,255,0.12), transparent);
    transform: translateX(-100%); transition: transform 0.4s;
  }
  .btn-nav:hover::before { transform: translateX(100%); }
  .btn-nav:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,200,255,0.2); }

  .btn-logout {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 3px;
    padding: 9px 22px;
    border: 1px solid rgba(255,56,96,0.35);
    background: transparent; color: var(--danger);
    cursor: pointer; text-transform: uppercase;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.3s;
  }
  .btn-logout:hover { background: rgba(255,56,96,0.1); border-color: var(--danger); box-shadow: 0 0 20px rgba(255,56,96,0.2); }

  /* ── MAIN ── */
  .main {
    position: relative; z-index: 1;
    max-width: 1140px; margin: 0 auto;
    padding: 44px 36px;
  }

  /* ── STATS ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; margin-bottom: 48px;
  }

  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 28px 24px; position: relative; overflow: hidden;
    clip-path: polygon(14px 0%, 100% 0%, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0% 100%, 0% 14px);
    animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    transition: border-color 0.3s;
  }
  .stat-card:hover { border-color: var(--border-bright); }
  .stat-card:nth-child(2) { animation-delay: 0.1s; }
  .stat-card:nth-child(3) { animation-delay: 0.2s; }

  /* top accent bar per card */
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent), transparent); }
  .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent2), transparent); }
  .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--accent4), transparent); }

  /* Corner inner brackets */
  .stat-card::after {
    content: ''; position: absolute;
    bottom: 8px; right: 8px;
    width: 16px; height: 16px;
    border-right: 1px solid var(--border-bright);
    border-bottom: 1px solid var(--border-bright);
    opacity: 0.4;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .stat-label::before {
    content: ''; width: 20px; height: 1px;
    background: var(--border-bright);
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px; letter-spacing: 2px;
    line-height: 1; color: var(--accent);
    text-shadow: 0 0 20px rgba(0,200,255,0.4);
  }
  .stat-card:nth-child(2) .stat-value { color: var(--accent2); text-shadow: 0 0 20px rgba(255,60,172,0.3); font-size: 22px; padding-top: 8px; }
  .stat-card:nth-child(3) .stat-value { color: var(--accent4); text-shadow: 0 0 20px rgba(61,255,176,0.3); }

  .stat-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted2); margin-top: 8px;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 5px;
    text-transform: uppercase; color: var(--text);
    white-space: nowrap;
  }

  .section-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border-bright), transparent);
  }

  .section-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 2px; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 5px 12px;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  /* ── ANALYSIS CARDS ── */
  #dataDisplay { display: grid; gap: 10px; }

  .analysis-card {
    background: var(--surface); border: 1px solid var(--border);
    overflow: hidden;
    clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
    transition: border-color 0.3s, box-shadow 0.3s;
    animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  .analysis-card:hover {
    border-color: var(--border-bright);
    box-shadow: 0 0 30px rgba(0,200,255,0.05);
  }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: rgba(0,200,255,0.02);
  }

  .card-type { display: flex; align-items: center; gap: 10px; }

  .type-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: 2.5px;
    padding: 4px 12px; text-transform: uppercase;
    clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
  }

  .badge-image { background: rgba(0,200,255,0.12); color: var(--accent); border: 1px solid rgba(0,200,255,0.3); }
  .badge-text  { background: rgba(255,60,172,0.1);  color: var(--accent2); border: 1px solid rgba(255,60,172,0.3); }
  .badge-audio { background: rgba(61,255,176,0.1);  color: var(--accent4); border: 1px solid rgba(61,255,176,0.3); }

  .card-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 1.5px; color: var(--muted2);
  }

  .card-body {
    padding: 18px 20px;
    display: flex; gap: 20px; align-items: flex-start;
  }

  .card-image {
    width: 76px; height: 76px; object-fit: cover;
    border: 1px solid var(--border); flex-shrink: 0;
    filter: saturate(0.6) brightness(0.85);
    transition: filter 0.3s;
  }
  .analysis-card:hover .card-image { filter: saturate(0.9) brightness(1); }

  .card-result {
    font-family: 'Exo 2', sans-serif;
    font-size: 14px; line-height: 1.7; color: var(--text);
    font-weight: 400;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 80px 40px;
    border: 1px dashed var(--border);
    clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
  }
  .empty-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.25; }
  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 4px; color: var(--muted); margin-bottom: 8px;
  }
  .empty-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 1px; color: var(--muted2);
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); }
</style>
</head>
<body>

<div class="grid-bg"><div class="grid-plane"></div></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<header class="header">
  <div class="header-left">
    <span class="header-logo">SYNTH</span>
    <div class="header-divider"></div>
    <span class="header-page">Command Center</span>
  </div>
  <div class="header-right">
    <div class="user-badge">
      <div class="user-dot"></div>
      <span id="userEmail">LOADING…</span>
    </div>
    <button class="btn-nav" onclick="goToAI()">⬡ AI Analysis</button>
    <button class="btn-logout" onclick="logout()">⏻ Logout</button>
  </div>
</header>

<main class="main">
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Analyses</div>
      <div class="stat-value" id="totalCount">—</div>
      <div class="stat-unit">records stored</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last Activity</div>
      <div class="stat-value" id="lastTime">—</div>
      <div class="stat-unit">timestamp</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">System Status</div>
      <div class="stat-value">LIVE</div>
      <div class="stat-unit">all systems nominal</div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">Analysis Log</span>
    <div class="section-line"></div>
    <span class="section-count" id="recordCount">0 records</span>
  </div>

  <div id="dataDisplay">
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">Awaiting Data Stream</div>
      <div class="empty-sub">No analyses found. Run a detection to begin.</div>
    </div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYgVdsQQGsQPmNlkviAAPyImvYGJ_aHdg",
  authDomain: "signupsystemcheck.firebaseapp.com",
  projectId: "signupsystemcheck",
  storageBucket: "signupsystemcheck.firebasestorage.app",
  messagingSenderId: "1676521893",
  appId: "1:1676521893:web:05a0961ca7e29d8963b84c",
  measurementId: "G-WLZZH6N3X7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function getBadgeClass(type) {
  if (!type) return 'badge-text';
  const t = type.toLowerCase();
  if (t.includes('image')) return 'badge-image';
  if (t.includes('audio')) return 'badge-audio';
  return 'badge-text';
}

async function loadData(userEmail) {
  const snapshot = await getDocs(collection(db, "analysis"));
  const container = document.getElementById("dataDisplay");
  const records = [];

  snapshot.forEach(doc => {
    const data = doc.data();
    if (data.user === userEmail) records.push(data);
  });

  document.getElementById('totalCount').textContent = records.length;
  document.getElementById('recordCount').textContent = records.length + ' records';

  if (records.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-title">No Records Found</div>
        <div class="empty-sub">Run your first analysis to see results here.</div>
      </div>`;
    return;
  }

  records.sort((a, b) => new Date(b.time) - new Date(a.time));
  document.getElementById('lastTime').textContent = records[0].time?.split(' ')[0] || '—';

  container.innerHTML = '';
  records.forEach((data, i) => {
    const card = document.createElement("div");
    card.className = "analysis-card";
    card.style.animationDelay = (i * 0.07) + 's';

    const imgHTML = data.image ? `<img src="${data.image}" class="card-image" alt="Analysis Image">` : '';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-type">
          <span class="type-badge ${getBadgeClass(data.type)}">${data.type || 'Unknown'}</span>
        </div>
        <span class="card-time">${data.time || ''}</span>
      </div>
      <div class="card-body">
        ${imgHTML}
        <div class="card-result">${data.result || ''}</div>
      </div>`;

    container.appendChild(card);
  });
}

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('userEmail').textContent = user.email;
    loadData(user.email);
  } else {
    window.location.href = "login.html";
  }
});

window.goToAI = function() { window.location.href = "index.html"; };
window.logout = function() {
  signOut(auth).then(() => { window.location.href = "login.html"; });
};
</script>

</body>
</html>
