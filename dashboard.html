<body>
    <div id="dashboardContent" style="display:none;">
        <h2>Dashboard</h2>
        <p id="welcomeMessage"></p>
        <button onclick="logout()">Log Out</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyr3jYdbo3WzKlpcWM1BzPoVupWCcxwuY",
            authDomain: "realitycheck-8f81e.firebaseapp.com",
            projectId: "realitycheck-8f81e",
            storageBucket: "realitycheck-8f81e.firebasestorage.app",
            messagingSenderId: "327799012369",
            appId: "1:327799012369:web:357f952334b3db077605b0",
            measurementId: "G-Q0MRZXDKXJ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("welcomeMessage").innerText = `Welcome, ${user.email}`;
                document.getElementById("dashboardContent").style.display = "block";
            } else {
                window.location.href = "/login";
            }
        });

        window.logout = function() {
            signOut(auth)
                .then(() => {
                    alert("Logged out successfully!");
                    window.location.href = "/login";
                })
                .catch((error) => {
                    alert(error.message);
                });
        };
    </script>
</body>
